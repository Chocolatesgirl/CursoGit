<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Página HTML5</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            font-size: 18px;
        }
        .contenedor {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Hola, mundo 👋</h1>
        <p>Este es un programa básico en HTML5.</p>
        <p>Puedes usar esta estructura como base para cualquier proyecto web.</p>

        <button onclick="mostrarMensaje()">Haz clic aquí</button>
    </div>

    <script>
        function mostrarMensaje() {
            alert("¡Bienvenida a tu primera página HTML5!");
        }
    </script>

</body>
</html>
